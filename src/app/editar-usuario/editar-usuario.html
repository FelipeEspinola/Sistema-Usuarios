<div class="min-h-screen bg-gray-50 px-4 py-10 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-lg">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Editar Usuário</h1>

    @if (!usuario) {
      <p class="text-sm text-gray-500">Carregando dados do usuário...</p>
    } @else {
      <div class="bg-white shadow-sm ring-1 ring-gray-200 rounded-lg p-6 space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ID</label>
          <input type="text" [value]="usuario.id" readonly
            class="w-full rounded-md border border-gray-300 bg-gray-100 px-3 py-2 text-sm text-gray-600 cursor-not-allowed" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
          <input type="text" [value]="usuario.nome"
            class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" [value]="usuario.email"
            class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div class="flex justify-end gap-3 pt-2">
          <button (click)="voltar()"
            class="rounded-md border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
            Voltar
          </button>
          <button disabled
            class="rounded-md bg-blue-400 px-4 py-2 text-sm font-medium text-white cursor-not-allowed opacity-60">
            Salvar
          </button>
        </div>

      </div>
    }
  </div>
</div>
